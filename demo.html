<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fixago AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b00;
            --primary-2: #ff8a00;
            --primary-3: #ffb800;
            --bg: #0f1115;
            --panel: rgba(20, 23, 31, 0.86);
            --panel-strong: rgba(15, 17, 21, 0.92);
            --line: rgba(255, 255, 255, 0.08);
            --line-strong: rgba(255, 255, 255, 0.14);
            --text: #ffffff;
            --muted: #9ca3af;
            --content: min(100%, 900px);
            --side-pad: clamp(12px, 4vw, 28px);
            --input-height: 82px;
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            height: 100%;
            min-height: 100dvh;
            overflow: hidden;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 86% 0%, rgba(255, 107, 0, 0.18), transparent 34%),
                radial-gradient(circle at 0% 96%, rgba(255, 138, 0, 0.1), transparent 36%),
                linear-gradient(145deg, #0b0d11 0%, #10131a 48%, #0f1115 100%);
        }

        button,
        textarea {
            font: inherit;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        .app-shell {
            height: 100dvh;
            max-height: 100dvh;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            overflow: hidden;
        }

        .header {
            border-bottom: 1px solid var(--line);
            background: rgba(15, 17, 21, 0.74);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            z-index: 30;
        }

        .header-inner {
            width: var(--content);
            margin: 0 auto;
            padding: max(14px, env(safe-area-inset-top)) var(--side-pad) 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            min-width: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-3));
            box-shadow: 0 12px 32px rgba(255, 107, 0, 0.28);
            display: grid;
            place-items: center;
            font-weight: 800;
            color: #fff;
            flex: 0 0 auto;
        }

        .brand-copy {
            min-width: 0;
        }

        .brand-copy h1 {
            margin: 0;
            font-size: clamp(18px, 3.7vw, 25px);
            line-height: 1.1;
            letter-spacing: -0.03em;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--primary-3));
            -webkit-background-clip: text;
            color: transparent;
        }

        .brand-copy p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: clamp(11px, 2.5vw, 13px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0 0 auto;
        }

        .badge {
            border: 1px solid rgba(255, 107, 0, 0.22);
            background: rgba(255, 107, 0, 0.1);
            color: #ffc078;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .reset-btn {
            height: 38px;
            padding: 0 14px;
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .reset-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.22);
        }

        .main {
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        .chat-scroll {
            height: 100%;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .chat-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .chat-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .chat-container {
            width: var(--content);
            min-height: 100%;
            margin: 0 auto;
            padding: clamp(16px, 3vw, 28px) var(--side-pad) 24px;
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2.2vw, 20px);
        }

        .message-row {
            display: flex;
            width: 100%;
            animation: rise 0.28s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        .message-row.bot-row,
        .message-row.tool-row {
            justify-content: flex-start;
        }

        .message {
            max-width: min(82%, 680px);
            padding: clamp(12px, 1.8vw, 16px) clamp(14px, 2vw, 22px);
            border-radius: 22px;
            line-height: 1.62;
            font-size: clamp(14px, 2.3vw, 15px);
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .message.user {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            border-bottom-right-radius: 7px;
            color: #fff;
            box-shadow: 0 12px 30px rgba(255, 107, 0, 0.26);
        }

        .message.bot {
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid var(--line);
            border-bottom-left-radius: 7px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        }

        .message.bot strong {
            color: #ffd166;
            font-weight: 700;
        }

        .message.bot a {
            color: #ffd166;
        }

        .message.bot ul,
        .message.bot ol {
            margin: 8px 0;
            padding-left: 22px;
        }

        .message.bot li {
            margin: 5px 0;
        }

        .message.tool {
            max-width: min(88%, 760px);
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px dashed rgba(255, 184, 0, 0.32);
            background: rgba(255, 184, 0, 0.08);
            color: #ffd166;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: clamp(11px, 2.1vw, 13px);
            line-height: 1.5;
        }

        .typing-fixed {
            position: absolute;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%) translateY(12px);
            width: var(--content);
            padding: 0 var(--side-pad);
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        .typing-fixed.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .typing-card {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 13px 16px;
            max-width: min(88%, 420px);
            border-radius: 22px;
            border-bottom-left-radius: 7px;
            border: 1px solid var(--line);
            background: rgba(24, 27, 36, 0.94);
            box-shadow: 0 16px 38px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            flex: 0 0 auto;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--primary);
            animation: bounce 1.25s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.28s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.14s;
        }

        .typing-text {
            color: var(--muted);
            font-size: 13px;
        }

        .input-area {
            border-top: 1px solid var(--line);
            background: rgba(15, 17, 21, 0.86);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 30;
        }

        .input-inner {
            width: var(--content);
            margin: 0 auto;
            padding: 14px var(--side-pad) max(14px, env(safe-area-inset-bottom));
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1 1 auto;
            min-width: 0;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.055);
            border: 1px solid var(--line-strong);
            border-radius: 20px;
            padding: 12px 16px;
            min-height: 52px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.18);
            transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(255, 107, 0, 0.55);
            background: rgba(255, 255, 255, 0.075);
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.12), inset 0 2px 10px rgba(0, 0, 0, 0.18);
        }

        textarea {
            width: 100%;
            min-height: 24px;
            max-height: min(30dvh, 160px);
            line-height: 1.5;
            display: block;
            border: 0;
            outline: 0;
            resize: none;
            color: var(--text);
            background: transparent;
            font-size: 15px;
            padding: 0;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.34);
        }

        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            border: 0;
            cursor: pointer;
            flex: 0 0 auto;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            box-shadow: 0 14px 34px rgba(255, 107, 0, 0.28);
            display: grid;
            place-items: center;
            transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 18px 42px rgba(255, 107, 0, 0.36);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .send-btn:disabled {
            opacity: 0.54;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 21px;
            height: 21px;
            fill: currentColor;
            transform: translateX(1px);
        }

        .empty-state {
            margin: auto;
            max-width: 520px;
            text-align: center;
            color: var(--muted);
            padding: 24px 12px;
        }

        .empty-state h2 {
            margin: 0 0 10px;
            color: #fff;
            font-size: clamp(20px, 4.2vw, 28px);
            letter-spacing: -0.03em;
        }

        .empty-state p {
            margin: 0;
            line-height: 1.6;
            font-size: 14px;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.35);
                opacity: 0.35;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 760px) {
            .header-inner {
                align-items: flex-start;
            }

            .brand-mark {
                width: 38px;
                height: 38px;
                border-radius: 14px;
            }

            .badge {
                display: none;
            }

            .reset-btn {
                height: 36px;
                padding: 0 12px;
                font-size: 12px;
            }

            .message {
                max-width: 90%;
                border-radius: 19px;
            }

            .message.tool {
                max-width: 94%;
            }

            .typing-card {
                max-width: 92%;
            }

            .send-btn {
                width: 50px;
                height: 50px;
                border-radius: 17px;
            }
        }

        @media (max-width: 520px) {
            .header-inner {
                padding-top: max(12px, env(safe-area-inset-top));
                padding-bottom: 12px;
            }

            .brand {
                gap: 10px;
            }

            .brand-mark {
                width: 36px;
                height: 36px;
                border-radius: 13px;
                font-size: 14px;
            }

            .brand-copy p {
                max-width: 170px;
            }

            .message {
                max-width: 94%;
                padding: 12px 14px;
                font-size: 14px;
                line-height: 1.56;
            }

            .chat-container {
                padding-top: 14px;
                padding-bottom: 20px;
            }

            .input-inner {
                padding-top: 10px;
                gap: 10px;
            }

            .input-wrapper {
                min-height: 48px;
                padding: 11px 13px;
                border-radius: 17px;
            }

            textarea {
                font-size: 16px;
                max-height: min(28dvh, 130px);
            }

            .send-btn {
                width: 48px;
                height: 48px;
                border-radius: 16px;
            }
        }

        @media (max-width: 390px) {
            :root {
                --side-pad: 10px;
            }

            .brand-copy p {
                display: none;
            }

            .reset-btn {
                padding: 0 10px;
            }

            .message {
                max-width: 96%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="header">
            <div class="header-inner">
                <div class="brand">
                    <div class="brand-mark">F</div>
                    <div class="brand-copy">
                        <h1>Fixago AI</h1>
                        <p>RAG + Live API + Prompt Guard</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="reset-btn" type="button" id="resetBtn">Reset Chat</button>
                    <div class="badge">Production Demo</div>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="chat-scroll" id="chatScroll">
                <section class="chat-container" id="chat" aria-live="polite">
                    <div class="empty-state" id="emptyState">
                        <h2>Fixago AI Assistant</h2>
                        <p>Hỏi về dịch vụ sửa điện, nước, máy lạnh, xây dựng, thạch cao hoặc đặt lịch thợ hỗ trợ tại nhà.</p>
                    </div>
                </section>
            </div>
            <div class="typing-fixed" id="typing">
                <div class="typing-card">
                    <div class="typing-dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <div class="typing-text">AI đang tổng hợp dữ liệu...</div>
                </div>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-inner">
                <div class="input-wrapper">
                    <textarea id="query" rows="1" placeholder="Hỏi AI về dịch vụ Fixago..." autocomplete="off"></textarea>
                </div>
                <button class="send-btn" type="button" id="sendBtn" aria-label="Gửi tin nhắn">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </footer>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const chatScroll = document.getElementById("chatScroll");
        const input = document.getElementById("query");
        const sendBtn = document.getElementById("sendBtn");
        const resetBtn = document.getElementById("resetBtn");
        const emptyState = document.getElementById("emptyState");
        const typing = document.getElementById("typing");
        const sessionKey = "fixago_chat_session";
        let isSending = false;
        let hasBooted = false;
        let shouldStickToBottom = true;

        function createSessionId() {
            if (window.crypto && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        }

        function getChatSessionId() {
            let sessionId = sessionStorage.getItem(sessionKey);
            if (!sessionId) {
                sessionId = createSessionId();
                sessionStorage.setItem(sessionKey, sessionId);
            }
            return sessionId;
        }

        function isNearBottom() {
            return chatScroll.scrollHeight - chatScroll.scrollTop - chatScroll.clientHeight < 80;
        }

        function scrollToBottom(force = false) {
            if (!force && !shouldStickToBottom) return;
            requestAnimationFrame(() => {
                chatScroll.scrollTop = chatScroll.scrollHeight;
            });
        }

        function resetSession() {
            sessionStorage.removeItem(sessionKey);
            clearMessages();
            bootAssistant(true);
        }

        function clearMessages() {
            chat.querySelectorAll(".message-row").forEach(node => node.remove());
            emptyState.style.display = "block";
            setTyping(false);
            shouldStickToBottom = true;
            scrollToBottom(true);
        }

        function setTyping(active) {
            typing.classList.toggle("active", Boolean(active));
            scrollToBottom();
        }

        function setSending(active) {
            isSending = Boolean(active);
            sendBtn.disabled = isSending;
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function formatBotText(text) {
            let safe = escapeHtml(text);
            safe = safe.replace(/\bFixago\b/g, "<strong>Fixago</strong>");
            safe = safe.replace(/(\d[\d.]*\s?(?:VNĐ|VND|đ))/gi, "<strong>$1</strong>");
            safe = safe.replace(/\n/g, "<br>");
            return safe;
        }

        function appendMsg(text, sender) {
            emptyState.style.display = "none";
            shouldStickToBottom = isNearBottom();

            const row = document.createElement("div");
            const msg = document.createElement("div");

            if (sender === "user") {
                row.className = "message-row user-row";
                msg.className = "message user";
                msg.textContent = text;
                shouldStickToBottom = true;
            } else if (sender === "tool") {
                row.className = "message-row tool-row";
                msg.className = "message tool";
                msg.textContent = text;
            } else {
                row.className = "message-row bot-row";
                msg.className = "message bot";
                msg.innerHTML = formatBotText(text);
            }

            row.appendChild(msg);
            chat.appendChild(row);
            scrollToBottom();
        }

        function autoResize() {
            input.style.height = "auto";
            input.style.height = `${Math.min(input.scrollHeight, Math.round(window.innerHeight * 0.28))}px`;
        }

        async function queryAssistant(text, includeHistory = true) {
            const res = await fetch("/api/v1/rag/query", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    session_id: getChatSessionId(),
                    query: text
                })
            });

            let data;
            try {
                data = await res.json();
            } catch (error) {
                data = { status: "error", message: "Phản hồi máy chủ không hợp lệ." };
            }

            if (!res.ok && data.status !== "success") {
                data.status = data.status || "error";
                data.message = data.message || `HTTP ${res.status}`;
            }

            return data;
        }

        async function bootAssistant(force) {
            if (hasBooted && !force) return;
            hasBooted = true;
            setTyping(true);

            try {
                // Boot message: don't include history
                const data = await queryAssistant("Xin chào, hãy giới thiệu ngắn gọn bạn là ai và bạn có thể làm gì bằng tiếng Việt.", false);
                setTyping(false);
                if (data.status === "success" && data.response) {
                    appendMsg(data.response, "bot");
                } else {
                    appendMsg("Xin chào! Tôi là trợ lý AI của Fixago. Bạn cần tôi hỗ trợ dịch vụ gì hôm nay?", "bot");
                }
            } catch (error) {
                setTyping(false);
                appendMsg("Xin chào! Tôi là trợ lý AI của Fixago. Bạn cần tôi hỗ trợ dịch vụ gì hôm nay?", "bot");
            }
        }

        async function sendMsg() {
            const text = input.value.trim();
            if (!text || isSending) return;

            appendMsg(text, "user");
            input.value = "";
            autoResize();
            setTyping(true);
            setSending(true);

            try {
                const data = await queryAssistant(text);
                setTyping(false);

                if (data.status === "success") {
                    if (Array.isArray(data.tool_calls)) {
                        data.tool_calls.forEach(tool => appendMsg(`⚙️ ${tool}`, "tool"));
                    }
                    appendMsg(data.response || "Em chưa có phản hồi phù hợp lúc này ạ.", "bot");
                } else {
                    appendMsg(`⚠️ ${data.message || "Có lỗi xảy ra khi xử lý yêu cầu."}`, "bot");
                }
            } catch (error) {
                setTyping(false);
                appendMsg("⚠️ Lỗi kết nối đến máy chủ AI. Mình kiểm tra lại server RAG giúp em nhé.", "bot");
            } finally {
                setSending(false);
                input.focus();
            }
        }

        chatScroll.addEventListener("scroll", () => {
            shouldStickToBottom = isNearBottom();
        });

        input.addEventListener("input", autoResize);

        input.addEventListener("keydown", event => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMsg();
            }
        });

        sendBtn.addEventListener("click", sendMsg);
        resetBtn.addEventListener("click", resetSession);

        window.addEventListener("resize", () => {
            autoResize();
            scrollToBottom(true);
        });

        window.addEventListener("load", () => bootAssistant(false));
    </script>
</body>
</html>
