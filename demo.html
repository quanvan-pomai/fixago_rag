<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixago AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-hover: #e66000;
            --bg-color: #0f1115;
            --chat-bg: #1a1d24;
            --user-msg: linear-gradient(135deg, #FF6B00, #FF8A00);
            --bot-msg: rgba(255, 255, 255, 0.03);
            --text-light: #ffffff;
            --text-muted: #9ca3af;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(255, 107, 0, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255, 107, 0, 0.05), transparent 40%);
            color: var(--text-light);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: rgba(15, 17, 21, 0.7);
            backdrop-filter: blur(12px);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }
        .header-content h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #FF6B00, #FFB800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header-content p {
            margin: 4px 0 0;
            font-size: 13px;
            color: var(--text-muted);
        }
        .badge {
            background: rgba(255, 107, 0, 0.1);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 107, 0, 0.2);
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.15);
        }
        .chat-container {
            flex: 1;
            padding: 30px max(20px, calc(50vw - 400px));
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }
        /* Custom scrollbar */
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .message {
            max-width: 85%;
            padding: 16px 24px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.6;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            word-wrap: break-word;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 8px 25px rgba(255, 107, 0, 0.25);
        }
        .bot {
            align-self: flex-start;
            background: var(--bot-msg);
            backdrop-filter: blur(10px);
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(255,255,255,0.08);
            white-space: pre-wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        /* Markdown style inside bot message */
        .bot ul { padding-left: 20px; margin: 10px 0; }
        .bot li { margin-bottom: 8px; }
        .bot strong { color: #FFB800; }
        
        .bot_tool {
            align-self: flex-start;
            background: rgba(255, 107, 0, 0.1);
            color: #FFB800;
            border: 1px dashed rgba(255, 107, 0, 0.3);
            border-radius: 12px;
            font-family: monospace;
            font-size: 13px;
            padding: 10px 16px;
            margin-bottom: -10px; /* pull closer to next bot msg */
        }
        
        .input-area {
            background: rgba(15, 17, 21, 0.8);
            backdrop-filter: blur(20px);
            padding: 20px max(20px, calc(50vw - 400px));
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            position: relative;
        }
        .input-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px 20px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        .input-wrapper:focus-within {
            border-color: rgba(255, 107, 0, 0.5);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1), inset 0 2px 5px rgba(0,0,0,0.2);
        }
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.5;
            display: block;
        }
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        button {
            background: var(--user-msg);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
            flex-shrink: 0;
            margin-bottom: 2px;
        }
        button:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 0, 0.4);
        }
        button:active {
            transform: scale(0.95);
        }
        button svg {
            fill: white;
            width: 20px;
            height: 20px;
            margin-left: 2px;
            transition: transform 0.3s;
        }
        button:hover svg {
            transform: translateX(2px) translateY(-2px);
        }
        
        /* Typing indicator */
        .typing-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: var(--bot-msg);
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            align-self: flex-start;
            border: 1px solid rgba(255,255,255,0.08);
            display: none;
        }
        .typing-text {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
        }
        .typing {
            display: flex;
            gap: 5px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>Fixago AI</h1>
            <p>RAG + Live API + Prompt Guard</p>
        </div>
        <div class="badge">Production Demo</div>
    </div>
    
    <div class="chat-container" id="chat">

        
        <div class="typing-wrapper" id="typing">
            <div class="typing">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="typing-text">AI đang tổng hợp dữ liệu...</div>
        </div>
    </div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="query" rows="1" placeholder="Hỏi AI về dịch vụ Fixago..." onkeypress="handleEnter(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button onclick="sendMsg()" id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const typing = document.getElementById('typing');
        const input = document.getElementById('query');
        const sendBtn = document.getElementById('sendBtn');

        window.onload = async function() {
            typing.style.display = 'flex';
            try {
                const res = await fetch('/api/v1/rag/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: "Xin chào, hãy giới thiệu ngắn gọn bạn là ai và bạn có thể làm gì bằng tiếng Việt." })
                });
                const data = await res.json();
                typing.style.display = 'none';
                if (data.status === 'success') {
                    appendMsg(data.response, 'bot');
                }
            } catch (err) {
                typing.style.display = 'none';
                appendMsg("Xin chào! Tôi là trợ lý ảo AI của Fixago. Bạn cần tôi giúp gì?", 'bot');
            }
        };

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function appendMsg(text, sender) {
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            
            // Highlight tool returns or errors subtly
            if (sender === 'bot') {
                text = text.replace(/Giá (.*?) VNĐ/g, '<strong>Giá $1 VNĐ</strong>');
                text = text.replace(/Fixago/g, '<strong>Fixago</strong>');
            }
            
            msg.innerHTML = text.replace(/\n/g, '<br>');
            chat.insertBefore(msg, typing);
            chat.scrollTop = chat.scrollHeight;
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        }

        async function sendMsg() {
            const text = input.value.trim();
            if (!text) return;

            appendMsg(text, 'user');
            input.value = '';
            input.style.height = 'auto';
            
            typing.style.display = 'flex';
            chat.scrollTop = chat.scrollHeight;
            sendBtn.style.opacity = '0.5';
            sendBtn.style.pointerEvents = 'none';

            try {
                const res = await fetch('/api/v1/rag/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });
                const data = await res.json();
                
                typing.style.display = 'none';
                
                if (data.status === 'success') {
                    if (data.tool_calls && data.tool_calls.length > 0) {
                        data.tool_calls.forEach(tool => {
                            appendMsg("⚙️ " + tool, 'bot_tool');
                        });
                    }
                    appendMsg(data.response, 'bot');
                } else {
                    appendMsg("⚠️ " + data.message, 'bot');
                }
            } catch (err) {
                typing.style.display = 'none';
                appendMsg("⚠️ Lỗi kết nối đến máy chủ AI (Port 8081).", 'bot');
            } finally {
                sendBtn.style.opacity = '1';
                sendBtn.style.pointerEvents = 'auto';
                input.focus();
            }
        }
    </script>
</body>
</html>
